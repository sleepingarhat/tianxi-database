name: HKJC Daily Scraper Auto Update

on:
  schedule:
    # 香港時間每天凌晨 11:30 自動運行 (UTC 03:30 HK 11:30 next day)
    - cron: '30 3 * * *'
  workflow_dispatch:            # 允許手動觸發測試

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chromium and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          chromium-browser --version
          chromedriver --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas selenium webdriver-manager

      - name: Run HKJC Scraper (daily update mode)
        env:
          SCRAPER_MODE: daily_update
          CHROMIUM_PATH: /usr/bin/chromium-browser
          CHROMEDRIVER_PATH: /usr/bin/chromedriver
        run: |
          python RacingData_Scraper.py

      - name: Check for changes
        id: check_changes
        run: |
          git add data/ failed_dates.log 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No new data to commit"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Found new data to commit"
          fi

      - name: Commit and push new data
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name "HKJC Scraper Bot"
          git config --global user.email "scraper-bot@noreply.github.com"
          git commit -m "Auto update: $(date -u +'%Y-%m-%d') new race data"
          git push origin main

      - name: Upload failed dates log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-dates-log
          path: failed_dates.log
          if-no-files-found: ignore
