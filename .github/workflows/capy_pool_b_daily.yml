name: Capy Pool B Daily — Trials + Jockeys

# Pool B lighter scrapers (TrialResults + JockeyData) — runs daily.
# Total wall-clock ~20 minutes. Each scraper is idempotent / skip-existing.

on:
  schedule:
    # HK 02:00 daily = UTC 18:00 previous day
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      skip_scrapers:
        description: 'Comma-separated scrapers to skip (e.g. TrialResults,JockeyData)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  pool-b:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-flight — fixture guard (any race day within ±2 days?)
        id: guard
        run: bash scripts/fixture_guard.sh --window 2 --direction any

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.run == 'true'
        with:
          python-version: '3.12'

      - name: Setup Chrome
        id: chrome
        if: steps.guard.outputs.run == 'true'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Setup ChromeDriver
        if: steps.guard.outputs.run == 'true'
        uses: nanasess/setup-chromedriver@v2

      - name: Export browser paths
        if: steps.guard.outputs.run == 'true'
        run: |
          echo "CHROMIUM_PATH=${{ steps.chrome.outputs.chrome-path }}" >> $GITHUB_ENV
          echo "CHROMEDRIVER_PATH=$(which chromedriver)" >> $GITHUB_ENV

      - name: Install Python deps
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pool B scrapers
        if: steps.guard.outputs.run == 'true'
        run: |
          SKIP="${{ github.event.inputs.skip_scrapers }}"
          for scraper in TrialResults_Scraper.py JockeyData_Scraper.py; do
            short=$(echo "$scraper" | sed 's/_Scraper\.py//')
            if echo ",$SKIP," | grep -q ",$short,"; then
              echo "::group::Skipping $scraper"
              echo "  skipped by dispatch input"
              echo "::endgroup::"
              continue
            fi
            echo "::group::$scraper"
            python "$scraper" || echo "  $scraper exited non-zero — continuing"
            echo "::endgroup::"
          done

      - name: Push Pool B data to main
        if: steps.guard.outputs.run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python git_sync.py \
            --message "[data][skip ci] pool-b $(date -u +%Y-%m-%dT%H:%MZ) via GHA"
