name: Capy Fixture Calendar — Weekly Refresh

# Refreshes data/fixtures/fixtures.csv once a week so race-day-aware workflows
# (capy_race_daily, capy_entries, capy_pool_a) can pre-flight-skip non-race days.
#
# Schedule: Monday HK 05:00 (UTC 21:00 Sunday). Manual dispatch allowed for
# ad-hoc refreshes (e.g., HKJC publishes next season's calendar).

on:
  schedule:
    - cron: '0 21 * * 0'   # Sunday 21:00 UTC = Monday 05:00 HKT
  workflow_dispatch:
    inputs:
      years:
        description: 'Years to scrape (comma-separated, blank = current + next)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fixture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install httpx pandas

      - name: Scrape fixture calendar
        run: |
          if [ -n "${{ github.event.inputs.years }}" ]; then
            python FixtureCalendar_Scraper.py --years "${{ github.event.inputs.years }}"
          else
            python FixtureCalendar_Scraper.py
          fi

      - name: Report cache status
        run: python fixture_guard.py cache-status

      - name: Next 10 upcoming meets
        run: python fixture_guard.py next-meets 10 || true

      - name: Push fixture cache to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python git_sync.py \
            --message "[data][skip ci] fixture-calendar $(date -u +%Y-%m-%dT%H:%MZ) via GHA"
