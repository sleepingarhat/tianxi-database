name: Capy Trainer Scraper

# Runs TrainerData_Scraper.py (fixes Replit's D1 silent-fail bug).
# Writes trainers/trainer_profiles.csv + trainers/records/<TID>.csv.

on:
  schedule:
    # HK 01:00 daily = UTC 17:00 previous day
    - cron: '0 17 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  trainers:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-flight — fixture guard (race day in past 2 days?)
        id: guard
        run: bash scripts/fixture_guard.sh --window 2 --direction past

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.run == 'true'
        with:
          python-version: '3.12'

      - name: Setup Chrome
        id: chrome
        if: steps.guard.outputs.run == 'true'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Setup ChromeDriver
        if: steps.guard.outputs.run == 'true'
        uses: nanasess/setup-chromedriver@v2

      - name: Export browser paths
        if: steps.guard.outputs.run == 'true'
        run: |
          echo "CHROMIUM_PATH=${{ steps.chrome.outputs.chrome-path }}" >> $GITHUB_ENV
          echo "CHROMEDRIVER_PATH=$(which chromedriver)" >> $GITHUB_ENV

      - name: Install Python deps
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run trainer scraper
        if: steps.guard.outputs.run == 'true'
        run: python TrainerData_Scraper.py

      - name: Push trainer data to main
        if: steps.guard.outputs.run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python git_sync.py \
            --message "[data][skip ci] trainers $(date -u +%Y-%m-%dT%H:%MZ) via GHA"
