name: Capy Trainer Scraper (D1 Fix)

# Fixes Replit's D1 silent-fail bug (TrainerData_Scraper.py broke on SPA URL).
# Reads existing trainers/trainer_profiles.csv for 67 trainer IDs,
# fetches TrainerProfile.aspx + TrainerPastRec.aspx for each, writes:
#   - trainers/trainer_profiles.csv  (14 cols, deduped — fixes 1431-row dupe bug)
#   - trainers/records/<TID>.csv     (18 cols — new data Replit never produced)
#
# Runs daily HK 01:00 (after Replit's race-day pipeline on Wed/Sun nights).

on:
  schedule:
    # HK 01:00 daily = UTC 17:00 prev day
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      ids:
        description: 'Comma-separated trainer IDs (e.g. FC,MKL,PP). Blank = all from CSV.'
        required: false
        default: ''

jobs:
  scrape-trainers:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: capy/scraper-v2
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: hkjc-data
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run trainer scraper
        working-directory: hkjc-data
        run: |
          if [ -n "${{ github.event.inputs.ids }}" ]; then
            python -m scrapers_v2.orchestrator.daily.scrape_trainers \
              --ids "${{ github.event.inputs.ids }}" \
              --rate 0.25 --log-level INFO
          else
            python -m scrapers_v2.orchestrator.daily.scrape_trainers \
              --rate 0.25 --log-level INFO
          fi

      - name: Commit trainer updates
        working-directory: hkjc-data
        run: |
          git config --global user.name  "Capy Scraper Bot"
          git config --global user.email "capy-bot@noreply.github.com"
          git add trainers/
          if git diff --cached --quiet; then
            echo "No trainer changes — skipping commit"
          else
            git commit -m "chore(capy): trainer refresh $(date -u +%Y-%m-%d)"
            git push origin capy/scraper-v2
          fi
