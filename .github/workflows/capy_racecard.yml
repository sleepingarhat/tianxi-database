name: Capy Racecard — enrich entries_upcoming via hkjc-api

# Fetches the full HKJC race card (runners + draw + jockey + weight)
# via hkjc-api.getAllRaces() and upserts into entries_upcoming in D1,
# replacing sentinel race_number=0 rows with real per-race data.
#
# Run AFTER capy_d1_sync_entries (D1 entries refreshed), BEFORE today-picks prediction.
# Triggered automatically by capy_d1_sync_entries completion to prevent races
# where a raw entries-sync wipes the enrichment. Schedule retained as belt-and-braces.
#
# Schedule: race-day mornings HKT (Mon/Wed/Fri/Sat 09:00 HKT = 01:00 UTC).

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Race date YYYY-MM-DD (blank = auto from API)'
        required: false
        default: ''
      venue:
        description: 'Venue ST or HV (blank = auto from API)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (print card, no D1 writes)'
        required: false
        default: 'false'
      since:
        description: 'D1 delete+push since YYYY-MM-DD (blank = today HKT)'
        required: false
        default: ''
  workflow_run:
    workflows: ['Capy D1 Sync Entries — forward-looking racecards']
    types: [completed]
    branches: [main]
  schedule:
    # Mon/Wed/Fri/Sat 09:00 HKT = 01:00 UTC — safety net if upstream chain skipped
    - cron: '0 1 * * 1,3,5,6'

permissions:
  contents: read

concurrency:
  group: capy-racecard
  cancel-in-progress: false

jobs:
  enrich-racecard:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout tianxi-backend (scrape-racecard.ts + push scripts)
        uses: actions/checkout@v4
        with:
          repository: sleepingarhat/tianxi-backend
          token: ${{ secrets.TIANXI_BACKEND_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps (hkjc-api + better-sqlite3)
        run: npm install --no-audit --no-fund

      - name: Create local scratch DB with full schema
        run: |
          set -eu
          rm -f bulk-local.db
          node -e "
            const Database = require('better-sqlite3');
            const fs = require('fs');
            const db = new Database('bulk-local.db');
            db.exec(fs.readFileSync('src/db/schema.sql',    'utf8'));
            db.exec(fs.readFileSync('src/db/schema_v2.sql', 'utf8'));
            console.log('schema applied');
          "

      - name: Scrape race card from HKJC API
        id: scrape
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -eu
          ARGS=""
          if [ -n "${{ inputs.date }}" ];     then ARGS="$ARGS --date=${{ inputs.date }}";   fi
          if [ -n "${{ inputs.venue }}" ];    then ARGS="$ARGS --venue=${{ inputs.venue }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          set +e
          npx tsx scripts/scrape-racecard.ts --db=bulk-local.db $ARGS 2>&1
          RC=$?
          set -e
          if [ $RC -ne 0 ]; then
            echo "::warning::scrape-racecard exited $RC — no active meeting; skipping push"
            echo "has_data=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "has_data=true" >> $GITHUB_OUTPUT

      - name: Resolve --since window
        if: steps.scrape.outputs.has_data == 'true' && github.event.inputs.dry_run != 'true'
        id: resolve
        run: |
          set -eu
          S="${{ github.event.inputs.since }}"
          if [ -z "$S" ]; then S=$(TZ=Asia/Hong_Kong date +%Y-%m-%d); fi
          echo "since=$S" >> $GITHUB_OUTPUT
          echo "Resolved since=$S"

      - name: Generate entries delta SQL chunks
        if: steps.scrape.outputs.has_data == 'true' && github.event.inputs.dry_run != 'true'
        env:
          SINCE: ${{ steps.resolve.outputs.since }}
        run: |
          set -eu
          rm -rf /tmp/d1-delta
          npx tsx scripts/push-delta.ts \
            --db=bulk-local.db \
            --since="$SINCE" \
            --include=entries \
            --out=/tmp/d1-delta
          ls -la /tmp/d1-delta/ | head -30 || echo "(no chunks)"

      - name: Install wrangler
        if: steps.scrape.outputs.has_data == 'true' && github.event.inputs.dry_run != 'true'
        run: npm install -g wrangler@4

      - name: Delete sentinel race_number=0 rows from D1
        if: steps.scrape.outputs.has_data == 'true' && github.event.inputs.dry_run != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          SINCE: ${{ steps.resolve.outputs.since }}
        run: |
          set -eu
          printf "DELETE FROM entries_upcoming WHERE race_date >= '%s' AND race_number = 0;\n" "$SINCE" > /tmp/delete-sentinels.sql
          wrangler d1 execute tianxi-db --remote --file=/tmp/delete-sentinels.sql
          echo "Sentinel rows deleted for race_date >= $SINCE"

      - name: Push enriched entries delta to D1
        if: steps.scrape.outputs.has_data == 'true' && github.event.inputs.dry_run != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -eu
          FAILED=0
          for t in race_meetings horses jockeys trainers entries_upcoming; do
            for f in /tmp/d1-delta/${t}-*.sql; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              if wrangler d1 execute tianxi-db --remote --file="$f" >/tmp/out.log 2>&1; then
                echo "OK  $base"
              else
                echo "FAIL $base"
                tail -20 /tmp/out.log
                FAILED=1
              fi
            done
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "Racecard enrichment pushed to D1 successfully"

      # Event-driven auto-chain: once the upcoming racecard is enriched in D1,
      # immediately trigger the LGB predict workflow in tianxi-backend so coverage
      # lands hours after declaration instead of waiting for its 20:00 UTC cron.
      - name: Trigger LGB predict on tianxi-backend
        if: steps.scrape.outputs.has_data == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_PAT: ${{ secrets.TIANXI_BACKEND_PAT }}
        run: |
          set -eu
          if curl -fsSL -X POST \
            -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/sleepingarhat/tianxi-backend/actions/workflows/lgb_predict_upcoming.yml/dispatches" \
            -d '{"ref":"main","inputs":{"days_ahead":"7"}}'; then
            echo "Dispatched lgb_predict_upcoming on tianxi-backend (entries enriched -> predict)"
          else
            echo "::warning::Failed to dispatch lgb_predict_upcoming; 20:00 UTC cron remains as backup"
          fi
