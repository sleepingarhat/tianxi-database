name: Capy Entries — Race Card (排位表)

# Runs EntryList_Scraper.py to fetch HKJC's 排位表 for the next meeting.
# Writes entries/today_entries.txt (consumed by Pool A comeback override)
# and entries/entries_<YYYY-MM-DD>.txt (dated archive).
#
# Auto-mode: HK 20:00 Mon / Tue / Sat (night before each meeting).

on:
  schedule:
    # HK 20:00 Mon,Tue,Sat = UTC 12:00 Mon,Tue,Sat
    - cron: '0 12 * * 1,2,6'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  entries:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-flight — fixture guard (tomorrow is race day?)
        id: guard
        run: bash scripts/fixture_guard.sh --window 1 --direction future

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.run == 'true'
        with:
          python-version: '3.12'

      - name: Setup Chrome
        id: chrome
        if: steps.guard.outputs.run == 'true'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Setup ChromeDriver
        if: steps.guard.outputs.run == 'true'
        uses: nanasess/setup-chromedriver@v2

      - name: Export browser paths
        if: steps.guard.outputs.run == 'true'
        run: |
          echo "CHROMIUM_PATH=${{ steps.chrome.outputs.chrome-path }}" >> $GITHUB_ENV
          echo "CHROMEDRIVER_PATH=$(which chromedriver)" >> $GITHUB_ENV

      - name: Install Python deps
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run entries scraper
        if: steps.guard.outputs.run == 'true'
        run: python EntryList_Scraper.py

      - name: Push entries to main
        if: steps.guard.outputs.run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python git_sync.py \
            --message "[data][skip ci] entries $(date -u +%Y-%m-%dT%H:%MZ) via GHA"
