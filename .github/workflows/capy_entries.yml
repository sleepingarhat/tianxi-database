name: Capy Entries Scraper

# Runs the night BEFORE each race meeting to fetch RaceCard.aspx racecards.
# Auto-mode: HK 20:00 Mon/Tue (for Wed HV) + Sat (for Sun ST).
# Writes entries/entries_YYYY-MM-DD.txt (Replit-legacy) + per-race CSVs (Capy-new).

on:
  schedule:
    # HK 20:00 Mon,Tue,Sat = UTC 12:00 Mon,Tue,Sat
    - cron: '0 12 * * 1,2,6'
  workflow_dispatch:
    inputs:
      date:
        description: 'ISO date (YYYY-MM-DD) — the race day, not today'
        required: true
      venue:
        description: 'Venue (ST or HV)'
        required: true
        default: 'ST'
      races:
        description: 'Race range (e.g. 1-10)'
        required: false
        default: '1-11'

jobs:
  scrape-entries:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: capy/scraper-v2
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: hkjc-data
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve target race date
        id: target
        working-directory: hkjc-data
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
            echo "venue=${{ github.event.inputs.venue }}" >> $GITHUB_OUTPUT
            echo "races=${{ github.event.inputs.races }}" >> $GITHUB_OUTPUT
          else
            # Auto: scrape tomorrow's racecard
            HK_TOMORROW=$(TZ=Asia/Hong_Kong date -d '+1 day' +%Y-%m-%d)
            DOW=$(TZ=Asia/Hong_Kong date -d '+1 day' +%u)
            if [ "$DOW" = "3" ]; then
              VENUE=HV
            else
              VENUE=ST
            fi
            echo "date=$HK_TOMORROW"  >> $GITHUB_OUTPUT
            echo "venue=$VENUE"       >> $GITHUB_OUTPUT
            echo "races=1-11"         >> $GITHUB_OUTPUT
          fi

      - name: Run entries scraper
        working-directory: hkjc-data
        run: |
          python -m scrapers_v2.orchestrator.daily.scrape_entries \
            --date ${{ steps.target.outputs.date }} \
            --venue ${{ steps.target.outputs.venue }} \
            --races ${{ steps.target.outputs.races }} \
            --rate 0.8 \
            --log-level INFO

      - name: Commit new entries
        working-directory: hkjc-data
        run: |
          git config --global user.name  "Capy Scraper Bot"
          git config --global user.email "capy-bot@noreply.github.com"
          git add entries/
          if git diff --cached --quiet; then
            echo "No new entries — skipping commit"
          else
            git commit -m "chore(capy): entries ${{ steps.target.outputs.date }} ${{ steps.target.outputs.venue }}"
            git push origin capy/scraper-v2
          fi
