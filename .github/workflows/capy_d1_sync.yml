name: Capy D1 Sync — push new race day to Cloudflare D1

# After capy_race_daily commits the CSV for a race meeting, this workflow
# ingests the new CSV into a scratch bulk-local.db and pushes a date-scoped
# delta to the remote Cloudflare D1 database (tianxi-db).
#
# Triggered automatically when capy_race_daily workflow completes successfully.
# Also supports workflow_dispatch with explicit --date override.

on:
  # Cron fallback — upstream capy_race_daily cron is 15:30 UTC; give it 45m
  # to finish scrape + commit before we try to push delta to D1.
  schedule:
    - cron: '23 16 * * *'   # 00:23 HK (after race_daily 23:30 HK)
  workflow_dispatch:
    inputs:
      date:
        description: 'Race date YYYY-MM-DD (blank = today HK)'
        required: false
        default: ''
      since:
        description: 'Delta push --since (blank = same as date)'
        required: false
        default: ''
  workflow_run:
    workflows: ['Capy Race Day — RacingData Results']
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  sync:
    # Only run when parent succeeded, or manual dispatch
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout tianxi-database (CSV source)
        uses: actions/checkout@v4
        with:
          path: tianxi-database
          fetch-depth: 1

      - name: Checkout tianxi-backend (ingest + push scripts)
        uses: actions/checkout@v4
        with:
          repository: sleepingarhat/tianxi-backend
          path: tianxi-backend
          token: ${{ secrets.TIANXI_BACKEND_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve target date
        id: resolve
        run: |
          set -eu
          D="${{ github.event.inputs.date }}"
          if [ -z "$D" ]; then
            D=$(TZ=Asia/Hong_Kong date +%Y-%m-%d)
          # Cron fires at 00:23 HK -> "today HK" already rolled over before
          # capy_race_daily (15:30 UTC = 23:30 HK) finishes scraping the just-
          # ended race day. If today's CSV doesn't exist yet but yesterday's
          # does, sync yesterday instead. Manual --date input bypasses this.
          YEAR_TODAY="${D%%-*}"
          if [ ! -f "tianxi-database/data/${YEAR_TODAY}/results_${D}.csv" ]; then
            D_YDAY=$(TZ=Asia/Hong_Kong date -d "yesterday" +%Y-%m-%d)
            YEAR_YDAY="${D_YDAY%%-*}"
            if [ -f "tianxi-database/data/${YEAR_YDAY}/results_${D_YDAY}.csv" ]; then
              echo "[date-fallback] today HK ($D) has no CSV; using yesterday HK ($D_YDAY)"
              D="$D_YDAY"
            fi
          fi
          fi
          SINCE="${{ github.event.inputs.since }}"
          if [ -z "$SINCE" ]; then
            SINCE="$D"
          fi
          echo "date=$D" >> $GITHUB_OUTPUT
          echo "since=$SINCE" >> $GITHUB_OUTPUT
          echo "year=${D%%-*}" >> $GITHUB_OUTPUT
          echo "Resolved date=$D since=$SINCE"

      - name: Verify CSV exists
        id: csv
        run: |
          set -eu
          DATE="${{ steps.resolve.outputs.date }}"
          YEAR="${{ steps.resolve.outputs.year }}"
          CSV="tianxi-database/data/${YEAR}/results_${DATE}.csv"
          if [ ! -f "$CSV" ]; then
            echo "::warning::No results CSV at $CSV — nothing to sync"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            rows=$(wc -l < "$CSV")
            echo "Found $CSV ($rows lines)"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install tianxi-backend deps
        if: steps.csv.outputs.skip != 'true'
        working-directory: tianxi-backend
        run: npm ci --no-audit --no-fund

      - name: Ingest CSV into scratch bulk-local.db
        if: steps.csv.outputs.skip != 'true'
        working-directory: tianxi-backend
        env:
          DATE: ${{ steps.resolve.outputs.date }}
        run: |
          set -eu
          # Use an empty scratch DB for this workflow run
          rm -f bulk-local.db
          # import-csv supports incremental inserts; schema bootstraps on first use
          npx tsx scripts/import-csv.ts \
            --data-dir ../tianxi-database/data \
            --db bulk-local.db \
            --date "$DATE"

      - name: Generate delta SQL chunks
        if: steps.csv.outputs.skip != 'true'
        working-directory: tianxi-backend
        env:
          SINCE: ${{ steps.resolve.outputs.since }}
        run: |
          set -eu
          rm -rf /tmp/d1-delta
          npx tsx scripts/push-delta.ts \
            --db=bulk-local.db \
            --since="$SINCE" \
            --include=race \
            --out=/tmp/d1-delta
          # push-delta.ts no longer wraps in BEGIN/COMMIT (D1-incompatible).
          ls -la /tmp/d1-delta/ | head -30

      - name: Install wrangler
        if: steps.csv.outputs.skip != 'true'
        run: npm install -g wrangler@4

      - name: Push delta to D1 (FK-parent-first order)
        if: steps.csv.outputs.skip != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        working-directory: tianxi-backend
        run: |
          set -eu
          ORDER=(horses jockeys trainers race_meetings races race_results running_comments dividends horse_elo_snapshots jockey_elo_snapshots trainer_elo_snapshots)
          FAILED=0
          for t in "${ORDER[@]}"; do
            for f in /tmp/d1-delta/${t}-*.sql; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              if wrangler d1 execute tianxi-db --remote --file="$f" >/tmp/out.log 2>&1; then
                echo "OK  $base"
              else
                echo "FAIL $base"
                tail -20 /tmp/out.log
                FAILED=1
              fi
            done
          done
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Verify D1 post-push
        if: steps.csv.outputs.skip != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -eu
          wrangler d1 execute tianxi-db --remote \
            --command="SELECT COUNT(*) AS meetings, MAX(date) AS latest FROM race_meetings" \
            --json | tail -40

      - name: Cleanup duplicate / phantom meeting rows
        if: steps.csv.outputs.skip != 'true'
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -eu
          if [ -z "${ADMIN_TOKEN:-}" ]; then
            echo "::warning::ADMIN_TOKEN secret not set — skipping cleanup-duplicate-meetings"
            exit 0
          fi
          echo "Probing for phantom meetings (dry-run)..."
          DRY=$(curl -sS -X POST -H "Authorization: Bearer $ADMIN_TOKEN"             "https://tianxi.racing/admin/api/cleanup-duplicate-meetings?dry=1")
          echo "$DRY"
          WOULD=$(echo "$DRY" | python3 -c "import sys,json;d=json.load(sys.stdin);print(len(d.get('wouldDelete',[])))" 2>/dev/null || echo 0)
          if [ "$WOULD" = "0" ]; then
            echo "No phantom meetings found — nothing to clean."
            exit 0
          fi
          echo "Found $WOULD phantom meeting(s) — executing cleanup..."
          curl -sS -X POST -H "Authorization: Bearer $ADMIN_TOKEN"             "https://tianxi.racing/admin/api/cleanup-duplicate-meetings"
          echo
