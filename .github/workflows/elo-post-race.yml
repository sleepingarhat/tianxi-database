name: ELO Post-Race Auto-Update

# Fires automatically after Capy Race Day commits new results CSVs.
# 1. Ingest HKJC CSVs (profiles + form) into scratch bulk-local.db
# 2. Run ELO v12 compute → horse/jockey/trainer_elo_snapshots
# 3. Generate delta SQL chunks via push-delta.ts (include=elo)
# 4. Push chunks to Cloudflare D1 via wrangler d1 execute
#
# Also supports manual dispatch for backfill.

on:
  # Cron fallback — ELO depends on race_daily (15:30 UTC) + d1_sync (16:23 UTC).
  # Run after d1_sync finishes so ELO sees fresh race results.
  schedule:
    - cron: '13 17 * * *'   # 01:13 HK (after d1_sync 00:23 HK)
  workflow_run:
    workflows: ['Capy Race Day — RacingData Results']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Push ELO snapshots from (YYYY-MM-DD, blank = 14d back)'
        required: false
        type: string
      force_full_recompute:
        description: 'Full recompute + push from 2016'
        required: false
        default: 'false'
        type: choice
        options: [ 'false', 'true' ]

permissions:
  contents: read

jobs:
  elo-update:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout tianxi-database (CSV source)
        uses: actions/checkout@v4
        with:
          path: tianxi-database
          fetch-depth: 1

      - name: Checkout tianxi-backend (push-delta.ts)
        uses: actions/checkout@v4
        with:
          repository: sleepingarhat/tianxi-backend
          path: tianxi-backend
          token: ${{ secrets.TIANXI_BACKEND_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve --since window
        id: resolve
        run: |
          set -eu
          if [ "${{ inputs.force_full_recompute }}" = "true" ]; then
            echo "since=2016-01-01" >> $GITHUB_OUTPUT
            echo "mode=full" >> $GITHUB_OUTPUT
          elif [ -n "${{ inputs.start_date }}" ]; then
            echo "since=${{ inputs.start_date }}" >> $GITHUB_OUTPUT
            echo "mode=since" >> $GITHUB_OUTPUT
          else
            S=$(TZ=Asia/Hong_Kong date -d "today -14 days" +%Y-%m-%d)
            echo "since=$S" >> $GITHUB_OUTPUT
            echo "mode=incremental" >> $GITHUB_OUTPUT
          fi

      - name: Install ELO pipeline deps
        working-directory: tianxi-database/.elo-pipeline
        run: npm ci --no-audit --no-fund

      - name: Install tianxi-backend deps
        working-directory: tianxi-backend
        run: npm ci --no-audit --no-fund

      - name: Ingest CSVs into bulk-local.db
        working-directory: tianxi-database/.elo-pipeline
        run: |
          npx tsx scripts/ingest/index.ts profiles form --data-dir=..
          ls -la bulk-local.db

      - name: Run ELO v12 compute
        working-directory: tianxi-database/.elo-pipeline
        env:
          ELO_SINCE: ${{ steps.resolve.outputs.since }}
          ELO_MODE: ${{ steps.resolve.outputs.mode }}
        run: |
          if [ "$ELO_MODE" = "full" ]; then
            npx tsx scripts/elo/compute.ts --engine v12 --full
          else
            npx tsx scripts/elo/compute.ts --engine v12 --since "$ELO_SINCE"
          fi

      - name: Verify ELO snapshots in bulk-local.db
        working-directory: tianxi-database/.elo-pipeline
        env:
          ELO_SINCE: ${{ steps.resolve.outputs.since }}
        run: |
          node -e "
            const Database = require('better-sqlite3');
            const db = new Database('./bulk-local.db', { readonly: true });
            const since = process.env.ELO_SINCE;
            const form = db.prepare('SELECT COUNT(*) AS n, MIN(race_date) AS min_d, MAX(race_date) AS max_d FROM horse_form_records').get();
            const formRecent = db.prepare('SELECT COUNT(*) AS n, MAX(race_date) AS max_d FROM horse_form_records WHERE race_date >= ?').get(since);
            const hAll = db.prepare('SELECT COUNT(*) AS n, MAX(as_of_date) AS max_d FROM horse_elo_snapshots').get();
            const jAll = db.prepare('SELECT COUNT(*) AS n, MAX(as_of_date) AS max_d FROM jockey_elo_snapshots').get();
            const tAll = db.prepare('SELECT COUNT(*) AS n, MAX(as_of_date) AS max_d FROM trainer_elo_snapshots').get();
            const hSince = db.prepare('SELECT COUNT(*) AS n FROM horse_elo_snapshots WHERE as_of_date >= ?').get(since);
            console.log('form (source)     :', form);
            console.log('form since ' + since + ' :', formRecent);
            console.log('horse snapshots   :', hAll);
            console.log('jockey snapshots  :', jAll);
            console.log('trainer snapshots :', tAll);
            console.log('horse snaps since :', hSince);
            if (hAll.n === 0) {
              console.error('::error::No horse ELO snapshots in bulk-local.db at all - compute step is broken.');
              process.exit(1);
            }
            if (form.max_d && hAll.max_d && hAll.max_d < form.max_d) {
              console.error('::error::Snapshot integrity gap: snapshots reach ' + hAll.max_d + ' but form_records reach ' + form.max_d + '. compute_v12.ts is dropping recent races.');
              process.exit(1);
            }
            if (hSince.n === 0) {
              console.log('::warning::No horse ELO snapshots updated since ' + since + ' - horse_form ingest is lagging behind results CSV. ELO is consistent with available form data; new results will be reflected after next profile re-scrape.');
            }
          "

      - name: Generate ELO delta SQL chunks
        working-directory: tianxi-backend
        env:
          SINCE: ${{ steps.resolve.outputs.since }}
        run: |
          set -eu
          rm -rf /tmp/d1-delta
          npx tsx scripts/push-delta.ts \
            --db=../tianxi-database/.elo-pipeline/bulk-local.db \
            --since="$SINCE" \
            --include=elo \
            --out=/tmp/d1-delta
          ls -la /tmp/d1-delta/ | head -40 || echo "(no chunks)"

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Push ELO delta to D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        working-directory: tianxi-backend
        run: |
          set -eu
          # FK-parent-first order for ELO snapshots
          ORDER=(horses jockeys trainers horse_elo_snapshots jockey_elo_snapshots trainer_elo_snapshots)
          FAILED=0
          for t in "${ORDER[@]}"; do
            for f in /tmp/d1-delta/${t}-*.sql; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              if wrangler d1 execute tianxi-db --remote --file="$f" >/tmp/out.log 2>&1; then
                echo "OK  $base"
              else
                echo "FAIL $base"
                tail -20 /tmp/out.log
                FAILED=1
              fi
            done
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi

      - name: Verify D1 ELO snapshots post-push
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -eu
          wrangler d1 execute tianxi-db --remote \
            --command="SELECT 'horse' AS axis, COUNT(*) AS rows, MAX(as_of_date) AS max_d FROM horse_elo_snapshots UNION ALL SELECT 'jockey', COUNT(*), MAX(as_of_date) FROM jockey_elo_snapshots UNION ALL SELECT 'trainer', COUNT(*), MAX(as_of_date) FROM trainer_elo_snapshots" \
            --json | tail -40
