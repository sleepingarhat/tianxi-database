name: Capy D1 Sync Pool A — trackwork + injury + form

# After capy_pool_a.yml commits fresh trackwork / injury / form_records CSVs,
# this workflow ingests them into a scratch bulk-local.db and pushes the
# delta to remote Cloudflare D1 (horse_trackwork / horse_injury / horse_form_records
# tables, plus any new horses referenced).
#
# Triggered automatically when capy_pool_a succeeds. Also supports
# workflow_dispatch with an explicit --since window.

on:
  workflow_dispatch:
    inputs:
      since:
        description: 'Lookback YYYY-MM-DD (rows with date >= this value; blank = 30 days back)'
        required: false
        default: ''
  workflow_run:
    workflows: ['Capy Pool A — Horse Profiles + Trackwork + Injury']
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  sync-pool-a:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout tianxi-database (CSV source)
        uses: actions/checkout@v4
        with:
          path: tianxi-database
          fetch-depth: 1

      - name: Checkout tianxi-backend (ingest + push scripts)
        uses: actions/checkout@v4
        with:
          repository: sleepingarhat/tianxi-backend
          path: tianxi-backend
          token: ${{ secrets.TIANXI_BACKEND_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve --since window
        id: resolve
        run: |
          set -eu
          S="${{ github.event.inputs.since }}"
          if [ -z "$S" ]; then
            # 30-day lookback default to catch any recent trackwork/injury entries
            S=$(TZ=Asia/Hong_Kong date -d "today -30 days" +%Y-%m-%d)
          fi
          echo "since=$S" >> $GITHUB_OUTPUT
          echo "Resolved --since=$S"

      - name: Install tianxi-backend deps
        working-directory: tianxi-backend
        run: npm ci --no-audit --no-fund

      - name: Ingest Pool A sources (profiles + form + trackwork + injury)
        working-directory: tianxi-backend
        run: |
          set -eu
          rm -f bulk-local.db
          # scripts/ingest/index.ts handles profiles/form/trackwork/injury
          npx tsx scripts/ingest/index.ts \
            profiles form trackwork injury \
            --data-dir=../tianxi-database \
            --db=bulk-local.db

      - name: Generate Pool A delta SQL chunks
        working-directory: tianxi-backend
        env:
          SINCE: ${{ steps.resolve.outputs.since }}
        run: |
          set -eu
          rm -rf /tmp/d1-delta
          npx tsx scripts/push-delta.ts \
            --db=bulk-local.db \
            --since="$SINCE" \
            --include=pool-a \
            --out=/tmp/d1-delta
          ls -la /tmp/d1-delta/ | head -30 || echo "(no chunks)"

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Push Pool A delta to D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        working-directory: tianxi-backend
        run: |
          set -eu
          # FK-parent-first order
          ORDER=(horses horse_trackwork horse_injury horse_form_records)
          FAILED=0
          for t in "${ORDER[@]}"; do
            for f in /tmp/d1-delta/${t}-*.sql; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              if wrangler d1 execute tianxi-db --remote --file="$f" >/tmp/out.log 2>&1; then
                echo "OK  $base"
              else
                echo "FAIL $base"
                tail -20 /tmp/out.log
                FAILED=1
              fi
            done
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi

      - name: Verify D1 post-push
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -eu
          wrangler d1 execute tianxi-db --remote \
            --command="SELECT 'horse_trackwork' AS tbl, COUNT(*) AS rows FROM horse_trackwork UNION ALL SELECT 'horse_injury', COUNT(*) FROM horse_injury UNION ALL SELECT 'horse_form_records', COUNT(*) FROM horse_form_records" \
            --json | tail -40
